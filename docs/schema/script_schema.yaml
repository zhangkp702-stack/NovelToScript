schema_name: NovelToScriptSchema
schema_version: "1.0.0"
description: >
  本 Schema 用于规范 AI 小说转剧本工具的 YAML 输出结构。
  系统应将小说文本转换为结构化剧本初稿，方便作者继续编辑、修改和扩展。

type: object
required:
  - metadata
  - characters
  - scenes
  - notes

properties:
  metadata:
    type: object
    description: 剧本元信息
    required:
      - title
      - source_type
      - language
      - generated_at
      - schema_version
    properties:
      title:
        type: string
        description: 剧本标题，可根据小说标题或内容自动生成
        example: "旧城雨夜"
      source_type:
        type: string
        description: 来源类型
        enum:
          - novel
          - outline
          - mixed_text
        example: "novel"
      language:
        type: string
        description: 剧本语言
        example: "zh-CN"
      generated_at:
        type: string
        description: 生成时间，建议使用 ISO 8601 格式
        example: "2026-06-05T12:00:00+08:00"
      schema_version:
        type: string
        description: 当前 YAML Schema 版本
        example: "1.0.0"
      logline:
        type: string
        description: 一句话故事梗概
        example: "一名青年在旧城雨夜中发现父亲失踪多年的真相。"
      genre:
        type: array
        description: 剧本类型
        items:
          type: string
        example:
          - 悬疑
          - 剧情
      target_format:
        type: string
        description: 目标剧本形式
        enum:
          - short_drama
          - web_series
          - film
          - stage_play
          - audio_drama
        example: "web_series"

  source_summary:
    type: object
    description: 原小说内容摘要
    properties:
      chapter_count:
        type: integer
        description: 输入小说的章节数量
        example: 3
      overall_summary:
        type: string
        description: 小说整体摘要
      chapter_summaries:
        type: array
        description: 分章节摘要
        items:
          type: object
          required:
            - chapter_index
            - chapter_title
            - summary
          properties:
            chapter_index:
              type: integer
              description: 章节序号
              example: 1
            chapter_title:
              type: string
              description: 章节标题
              example: "第一章 雨夜归人"
            summary:
              type: string
              description: 本章剧情摘要

  characters:
    type: array
    description: 角色列表
    items:
      type: object
      required:
        - id
        - name
        - role_type
        - description
      properties:
        id:
          type: string
          description: 角色唯一标识
          example: "char_001"
        name:
          type: string
          description: 角色名称
          example: "林川"
        role_type:
          type: string
          description: 角色类型
          enum:
            - protagonist
            - antagonist
            - supporting
            - minor
          example: "protagonist"
        age:
          type: string
          description: 年龄或年龄段
          example: "28岁"
        description:
          type: string
          description: 角色基本描述
        motivation:
          type: string
          description: 角色核心动机
        relationship:
          type: array
          description: 与其他角色的关系
          items:
            type: object
            properties:
              target_character_id:
                type: string
                description: 关联角色 ID
                example: "char_002"
              relation_type:
                type: string
                description: 关系类型
                example: "父子"
              description:
                type: string
                description: 关系说明

  scenes:
    type: array
    description: 剧本场景列表
    items:
      type: object
      required:
        - scene_id
        - scene_title
        - location
        - time
        - characters
        - action
        - dialogues
      properties:
        scene_id:
          type: string
          description: 场景唯一标识
          example: "scene_001"
        scene_title:
          type: string
          description: 场景标题
          example: "旧城车站外"
        source_chapter:
          type: integer
          description: 对应原小说章节序号
          example: 1
        location:
          type: string
          description: 场景地点
          example: "旧城火车站外"
        time:
          type: string
          description: 场景时间
          example: "夜晚"
        weather:
          type: string
          description: 天气或环境氛围
          example: "大雨"
        characters:
          type: array
          description: 本场景出现的角色 ID 列表
          items:
            type: string
          example:
            - "char_001"
            - "char_002"
        action:
          type: string
          description: 场景动作描写，用于描述人物行为、环境变化和镜头感
        dialogues:
          type: array
          description: 台词列表
          items:
            type: object
            required:
              - speaker
              - content
            properties:
              speaker:
                type: string
                description: 说话角色 ID 或角色名
                example: "char_001"
              content:
                type: string
                description: 台词内容
                example: "我回来了。"
              emotion:
                type: string
                description: 说话情绪
                example: "压抑"
              parenthetical:
                type: string
                description: 台词提示，例如停顿、低声、苦笑等
                example: "低声"
        transition:
          type: string
          description: 场景转场方式
          enum:
            - cut
            - fade_in
            - fade_out
            - dissolve
            - montage
            - none
          example: "cut"
        dramatic_purpose:
          type: string
          description: 本场景的戏剧功能，例如交代背景、制造冲突、推动转折等
          example: "交代主角回到旧城，并埋下父亲失踪线索。"

  structure:
    type: object
    description: 剧本结构分析
    properties:
      acts:
        type: array
        description: 幕结构
        items:
          type: object
          properties:
            act_index:
              type: integer
              description: 幕序号
              example: 1
            act_title:
              type: string
              description: 幕标题
              example: "归来"
            scene_ids:
              type: array
              description: 本幕包含的场景 ID
              items:
                type: string
            summary:
              type: string
              description: 本幕剧情摘要
      conflict:
        type: string
        description: 核心冲突
      turning_points:
        type: array
        description: 关键转折点
        items:
          type: object
          properties:
            scene_id:
              type: string
              description: 对应场景 ID
            description:
              type: string
              description: 转折说明

  notes:
    type: object
    description: 生成说明和后续编辑建议
    properties:
      adaptation_strategy:
        type: string
        description: 改编策略说明，例如删减、合并、强化冲突等
      editable_suggestions:
        type: array
        description: 给作者的后续修改建议
        items:
          type: string
      warnings:
        type: array
        description: 生成过程中发现的问题，例如原文信息不足、角色动机不清等
        items:
          type: string