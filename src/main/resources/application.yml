spring:
  application:
    name: test
  datasource:
    url: jdbc:mysql://192.168.126.100:3306/NTS_user?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 192.168.126.100
      port: 6379
      password: 123456

auth:
  session:
    use-redis: true
    ttl-seconds: 7200

ai:
  providers:
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
    deepseek:
      url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
    ollama:
      url: http://127.0.0.1:11434
      endpoints:
        chat: /v1/chat/completions
    openai:
      url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
  selection:
    failure-threshold: 2
    open-duration-ms: 30000
    first-token-timeout-ms: 8000
    connect-timeout-ms: 10000
    request-timeout-ms: 120000
  stream-executor:
    core-size: 4
    max-size: 16
    queue-capacity: 200
    keep-alive-seconds: 60
    thread-name-prefix: llm-stream-
    rejection-policy: caller-runs
  chat:
    default-model: ollama-local
    candidates:
      - id: siliconflow-primary
        provider: siliconflow
        model: Qwen/Qwen2.5-7B-Instruct
        priority: 1
        enabled: false
      - id: deepseek-backup
        provider: deepseek
        model: deepseek-chat
        priority: 2
        enabled: false
      - id: ollama-local
        provider: ollama
        model: "qwen2.5:7b"
        priority: 3
        enabled: true
      - id: openai-gpt4o-mini
        provider: openai
        model: gpt-4o-mini
        priority: 4
        enabled: false
      - id: bailian-qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 5
        enabled: false

llm:
  trace:
    enabled: true
    max-error-length: 1000
